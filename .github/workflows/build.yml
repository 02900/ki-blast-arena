name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Ki Blast Arena
    runs-on: ubuntu-latest
    # The public toolchain image provides the cross compiler + PSL1GHT + libraries.
    container:
      image: ghcr.io/02900/ps3-toolchain:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ki-blast-arena
          # The Makefile names the output after the checkout dir (the repo name),
          # so match by glob rather than a hard-coded filename.
          path: "*.self"
          if-no-files-found: error
